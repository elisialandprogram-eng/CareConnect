# Fly.io deployment configuration for GoldenLife
# Deploy: fly launch --config fly.toml
# Docs: https://fly.io/docs/reference/configuration/

app = "golden-life"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "10s"

[mounts]
  # Uncomment to add persistent storage for uploaded files
  # source = "golden_life_data"
  # destination = "/app/uploads"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
